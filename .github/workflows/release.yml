name: Release

# Builds the Windows installer and drafts a GitHub Release whenever a
# version tag (v0.2.0, v1.0.0, ...) is pushed. The draft lets you write
# release notes before publishing.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY          — contents of ~/.tauri/mini-for-claude.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string (key has no password)
# These sign the UPDATE artifacts (latest.json) so installed apps can
# verify updates. This is separate from Windows code signing.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mini Chat for Claude ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
