<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Chat for Claude</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <!-- Drag region: top strip you can grab to move the frameless window.
           data-tauri-drag-region is the magic attribute that tells Tauri
           "treat clicks here as a window drag, not a click." -->
      <header class="titlebar" data-tauri-drag-region>
        <div class="titlebar__title" data-tauri-drag-region>Mini Chat for Claude</div>
        <div class="titlebar__actions">
          <button class="titlebar__btn" id="btn-new" title="New chat">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
              <path fill="currentColor" d="M8 1.5a.75.75 0 0 1 .75.75v5h5a.75.75 0 0 1 0 1.5h-5v5a.75.75 0 0 1-1.5 0v-5h-5a.75.75 0 0 1 0-1.5h5v-5A.75.75 0 0 1 8 1.5Z"/>
            </svg>
          </button>
          <button class="titlebar__btn" id="btn-history" title="Sessions & export">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
              <path fill="currentColor" d="M8 1a7 7 0 1 0 7 7 .75.75 0 0 0-1.5 0A5.5 5.5 0 1 1 8 2.5a5.46 5.46 0 0 1 3.89 1.61l-1.64 1.64a.5.5 0 0 0 .35.85h3.9a.5.5 0 0 0 .5-.5V2.2a.5.5 0 0 0-.85-.35l-1.2 1.2A6.96 6.96 0 0 0 8 1Zm-.75 3.75v3.56l2.72 2.72a.75.75 0 1 0 1.06-1.06L8.75 7.69V4.75a.75.75 0 0 0-1.5 0Z"/>
            </svg>
          </button>
          <button class="titlebar__btn" id="btn-settings" title="Settings">
            <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
              <path fill="currentColor" d="M8 5.25a2.75 2.75 0 1 0 0 5.5 2.75 2.75 0 0 0 0-5.5ZM6.75 8a1.25 1.25 0 1 1 2.5 0 1.25 1.25 0 0 1-2.5 0Z"/>
              <path fill="currentColor" d="M6.83.75a.75.75 0 0 0-.74.63l-.22 1.36a5.9 5.9 0 0 0-1.09.63l-1.29-.5a.75.75 0 0 0-.92.32l-1.17 2.02a.75.75 0 0 0 .18.96l1.07.87a6 6 0 0 0 0 1.26l-1.07.87a.75.75 0 0 0-.18.96l1.17 2.02c.19.32.58.46.92.32l1.29-.5c.34.25.7.46 1.09.63l.22 1.36c.06.36.37.63.74.63h2.34c.37 0 .68-.27.74-.63l.22-1.36c.39-.17.75-.38 1.09-.63l1.29.5c.34.14.73 0 .92-.32l1.17-2.02a.75.75 0 0 0-.18-.96l-1.07-.87a6 6 0 0 0 0-1.26l1.07-.87a.75.75 0 0 0 .18-.96L13.94 3.2a.75.75 0 0 0-.92-.32l-1.29.5a5.9 5.9 0 0 0-1.09-.63L10.42 1.4a.75.75 0 0 0-.74-.63H6.83Zm.63 2.16.18-1.16h1.72l.18 1.16c.05.28.25.5.51.6.5.18.96.45 1.36.78.21.18.5.23.76.13l1.1-.42.86 1.48-.92.75a.75.75 0 0 0-.26.72 4.5 4.5 0 0 1 0 2.1.75.75 0 0 0 .26.72l.92.75-.86 1.48-1.1-.42a.75.75 0 0 0-.76.13c-.4.33-.86.6-1.36.79a.75.75 0 0 0-.51.6l-.18 1.15H7.64l-.18-1.16a.75.75 0 0 0-.51-.6c-.5-.18-.96-.45-1.36-.78a.75.75 0 0 0-.76-.13l-1.1.42-.86-1.48.92-.75a.75.75 0 0 0 .26-.72 4.5 4.5 0 0 1 0-2.1.75.75 0 0 0-.26-.72l-.92-.75.86-1.48 1.1.42c.26.1.55.05.76-.13.4-.33.86-.6 1.36-.78a.75.75 0 0 0 .51-.6Z"/>
            </svg>
          </button>
          <button class="titlebar__btn" id="btn-min" title="Minimize">
            <svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true">
              <path fill="currentColor" d="M2.75 7.25h10.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5Z"/>
            </svg>
          </button>
          <button class="titlebar__btn" id="btn-close" title="Hide (Ctrl+Shift+Space to summon) · Shift+click to quit">
            <svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true">
              <path fill="currentColor" d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Scrollable message area -->
      <main class="messages" id="messages">
        <div class="welcome">
          <div class="welcome__title">Mini Chat for Claude</div>
          <div class="welcome__hint">Type below to start a conversation.</div>
          <div class="welcome__hint welcome__hint--kbd">Ctrl+Shift+Space summons or hides this window</div>
        </div>
      </main>

      <!-- Pinned input bar -->
      <footer class="composer">
        <div class="composer__badges">
          <div class="composer__model" id="model-picker">Sonnet 4.6</div>
          <div class="composer__model composer__effort" id="effort-picker" title="Effort level — how much thinking the model spends">auto</div>
        </div>
        <textarea
          class="composer__input"
          id="input"
          rows="1"
          placeholder="Message Claude…"
          autofocus
        ></textarea>
        <button class="composer__send" id="send" title="Send (Enter)">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path fill="currentColor" d="M1.724 1.053a.5.5 0 0 0-.714.545l1.403 4.85a.5.5 0 0 0 .397.354l5.69.953c.268.053.268.437 0 .49l-5.69.953a.5.5 0 0 0-.397.354l-1.403 4.85a.5.5 0 0 0 .714.545l13-6.5a.5.5 0 0 0 0-.894l-13-6.5Z"/>
          </svg>
        </button>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
